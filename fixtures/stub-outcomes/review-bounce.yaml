# Scripted stub outcomes exercising the L1 rework loop (code_reviewer requests changes, the
# orchestrator routes back to the implementer, then the loop resolves on the second pass).
# code_reviewer and implementer each get two scripted visits; every other node is visited once.
#
# See tests/test_transition_table.py::test_stub_scenario_is_a_valid_walk, which asserts this
# scenario traces T1, T2, T3, L1, T3, T4, T5, T6, T7, T8 through config/transition_table.yaml,
# and that the state history records the L1 loop_increment (step-02 Tier-2 "Loops").
scenario: review-bounce

nodes:
  refiner:
    - outcome: spec_ready
      artifact:
        type: refined_spec
        content: "stub refined spec"

  designer:
    - outcome: design_ready
      artifact:
        type: design_doc
        content: "stub design doc"

  implementer:
    - outcome: code_complete
      artifact:
        type: diff
        content: "stub diff v1"
    - outcome: code_complete
      artifact:
        type: diff
        content: "stub diff v2 (post-rework, addresses the review's requested changes)"

  code_reviewer:
    - outcome: request_changes
      artifact:
        type: review_report
        content: |
          # Review report (stub)
          Verdict: request_changes. Blocking finding: stub finding for the rework-loop scenario.
    - outcome: approve
      artifact:
        type: review_report
        content: |
          # Review report (stub)
          Verdict: approve. Prior blocking finding resolved.

  documenter:
    - outcome: docs_ready
      artifact:
        type: docs_changeset
        content: "stub docs changeset"

  documentation_reviewer:
    - outcome: approve
      artifact:
        type: docs_review_report
        content: "stub docs review report: approve"

  submitter:
    - outcome: pr_created
      artifact:
        type: pull_request
        content: "stub PR https://example.invalid/pr/2"

  pr_shepherd:
    - outcome: pr_terminal
      artifact:
        type: pr_status_report
        content: "stub PR status report: merged"
